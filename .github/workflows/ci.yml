name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --all-features
        run: cargo test --all-features

  build-release:
    name: release build (${{ matrix.target }})
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          set -eu
          cd target/${{ matrix.target }}/release
          tar -czf ../../../smited-watch-${{ github.ref_name }}-${{ matrix.target }}.tar.gz smited-watch
      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target\${{ matrix.target }}\release\smited-watch.exe `
            -DestinationPath smited-watch-${{ github.ref_name }}-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: smited-watch-${{ matrix.target }}
          path: smited-watch-${{ github.ref_name }}-${{ matrix.target }}.*
          if-no-files-found: error
